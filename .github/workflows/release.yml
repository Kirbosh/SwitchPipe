name: Release Build

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag to publish (e.g. 0.0.1)'
        required: true
        default: '0.0.1'

permissions:
  contents: write

jobs:
  build-switch-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare cache directories
        run: mkdir -p .cache/portlibs-switch

      - name: Cache Switch portlibs
        uses: actions/cache@v4
        with:
          path: |
            .cache/portlibs-switch
          key: ${{ runner.os }}-switch-portlibs-${{ hashFiles('build.sh', 'CMakeLists.txt', 'vendor/switch-portlibs/build_custom_portlibs.sh', 'vendor/switch-portlibs/ffmpeg/**', 'vendor/switch-portlibs/mpv/**') }}

      - name: Verify Docker
        run: docker version

      - name: Build Switch NRO
        env:
          PORTLIBS_DIR: ${{ github.workspace }}/.cache/portlibs-switch
        run: ./build.sh

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp cmake-build-switch/switch_newpipe.nro dist/SwitchPipe.nro
          sha256sum dist/SwitchPipe.nro > dist/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: switchpipe-release
          path: |
            dist/SwitchPipe.nro
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: SwitchPipe ${{ github.event.inputs.version || github.ref_name }}
          body: |
            SwitchPipe ${{ github.event.inputs.version || github.ref_name }} — adless YouTube client for Nintendo Switch homebrew.

            Copy `SwitchPipe.nro` to `sdmc:/switch/` and launch it from the Homebrew Menu.

            Highlights in this build:
            - Up to 1080p playback (adaptive video + audio), plus 720p / compatibility / data-saver modes
            - In-player settings menu (`+`): subtitles, audio track, on-the-fly quality
            - Like / Subscribe / Post comment from the video details screen (sign-in required)
            - Global search from any tab (`ZL`)
            - Cookie sign-in from Settings ▸ Login session
            - Faster navigation (connection reuse + detail caching)

            Verify the download against `SHA256SUMS.txt`.
          files: |
            dist/SwitchPipe.nro
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
